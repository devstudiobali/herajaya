<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 675" role="img" aria-labelledby="title desc">
  <title id="title">Herajaya copier product placeholder</title>
  <desc id="desc">Illustration of a modern photocopy machine for Herajaya product catalog.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b0f19"/>
      <stop offset="0.55" stop-color="#0a1128"/>
      <stop offset="1" stop-color="#001f54"/>
    </linearGradient>
    <linearGradient id="machine" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc" stop-opacity=".95"/>
      <stop offset="1" stop-color="#93c5fd" stop-opacity=".78"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
